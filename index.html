<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受験スケジュールナビ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8FAF8;
  --bg-card: #FFFFFF;
  --bg-hover: #F2F7F2;
  --text-primary: #1A2E1A;
  --text-secondary: #4A5E4A;
  --text-tertiary: #7A8E7A;
  --border: #D6E4D6;
  --border-light: #E8F0E8;
  --accent: #1B8C5A;
  --accent-light: #E8F5EE;
  --accent-dark: #14704A;
  --green: #0F7B4A;
  --green-light: #E6F5ED;
  --amber: #B8860B;
  --amber-light: #FDF8EB;
  --red: #C0392B;
  --red-light: #FDECEC;
  --purple: #5B7A3A;
  --purple-light: #F0F5EB;
  --coral: #C2652A;
  --coral-light: #FDF2EB;
  --shadow-sm: 0 1px 3px rgba(20,60,30,0.05);
  --shadow-md: 0 4px 12px rgba(20,60,30,0.07);
  --shadow-lg: 0 8px 30px rgba(20,60,30,0.10);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif; background:var(--bg); color:var(--text-primary); line-height:1.6; font-size:15px; -webkit-font-smoothing:antialiased; }

.header { background:#FFFFFF; border-bottom:2px solid var(--accent); padding:0 24px; position:sticky; top:0; z-index:100; }
.header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:64px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; font-weight:700; }
.logo-text { font-size:18px; font-weight:700; letter-spacing:-0.02em; }
.logo-text span { color:var(--accent); }
.header-controls { display:flex; align-items:center; gap:12px; }
.year-select { appearance:none; background:#F2F7F2; border:1px solid var(--border); border-radius:var(--radius-xs); padding:8px 32px 8px 12px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%235C5C5C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 10px center; }

.tabs { max-width:1200px; margin:0 auto; padding:16px 24px 0; display:flex; gap:4px; }
.tab { padding:10px 20px; font-size:16px; font-weight:500; color:var(--text-secondary); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; font-family:inherit; transition:all .2s; border-radius:var(--radius-xs) var(--radius-xs) 0 0; }
.tab:hover { background:var(--bg-hover); color:var(--text-primary); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

.main { max-width:1200px; margin:0 auto; padding:20px 24px 60px; }

.stats-bar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.stat-card { flex:1; min-width:140px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px; box-shadow:var(--shadow-sm); }
.stat-label { font-size:14px; color:var(--text-tertiary); font-weight:500; margin-bottom:4px; }
.stat-value { font-size:32px; font-weight:700; letter-spacing:-0.02em; }
.stat-value.blue { color:var(--accent); }
.stat-value.green { color:var(--green); }
.stat-value.amber { color:var(--coral); }

.filter-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
.search-input { flex:1; min-width:200px; padding:12px 14px 12px 38px; border:1px solid var(--border); border-radius:var(--radius-xs); font-size:15px; font-family:inherit; background:var(--bg-card) url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='7' cy='7' r='5.5' stroke='%238A8A8A' stroke-width='1.5'/%3E%3Cpath d='M11 11L14 14' stroke='%238A8A8A' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat 12px center; transition:border-color .2s; }
.search-input:focus { outline:none; border-color:var(--accent); }
.filter-select { appearance:none; padding:12px 32px 12px 12px; border:1px solid var(--border); border-radius:var(--radius-xs); font-size:15px; font-family:inherit; background:var(--bg-card) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%235C5C5C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center; cursor:pointer; }

.calendar-timeline { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow-sm); overflow-x:auto; }
.timeline-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.timeline-title { font-size:18px; font-weight:600; }
.month-nav { display:flex; gap:4px; flex-wrap:wrap; }
.month-btn { padding:5px 14px; border:1px solid var(--border); border-radius:var(--radius-xs); background:none; font-size:13px; font-family:inherit; cursor:pointer; color:var(--text-secondary); transition:all .15s; }
.month-btn:hover,.month-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.timeline-bar:hover { transform:scaleY(1.2); box-shadow:var(--shadow-md); z-index:2; }
.bar-app { background:var(--accent); }
.bar-exam { background:var(--coral); }
.bar-result { background:#3AAF6F; }
.day-header { display:grid; margin-bottom:0; border-bottom:1px solid var(--border); }
.day-header-cell { font-size:12px; color:var(--text-tertiary); text-align:center; padding:5px 0; border-right:1px solid var(--border-light); font-weight:500; }
.day-header-cell.week-start { border-right:1px solid var(--border); font-weight:600; color:var(--text-secondary); }
.day-header-cell.today { background:var(--red-light); color:var(--red); font-weight:700; }
.timeline-grid-row { display:grid; align-items:center; min-height:48px; border-bottom:1px solid var(--border-light); }
.timeline-grid-row:nth-child(even) { background:rgba(0,0,0,0.01); }
.timeline-grid-row:hover { background:var(--bg-hover); }
.timeline-school-cell { font-size:13px; font-weight:500; padding:4px 8px 4px 4px; overflow:hidden; white-space:normal; border-right:2px solid var(--border); line-height:1.3; }
.timeline-school-cell small { display:block; font-size:13px; color:var(--text-primary); font-weight:500; margin-top:1px; }
.timeline-type-cell { font-size:12px; font-weight:500; padding:4px 6px; overflow:hidden; text-overflow:ellipsis; white-space:normal; word-break:break-all; border-right:2px solid var(--border); color:var(--text-secondary); line-height:1.3; }
.timeline-day-cell { position:relative; height:100%; border-right:1px solid var(--border-light); min-height:48px; }
.timeline-day-cell.week-start { border-right:1px solid var(--border); }
.timeline-day-cell.today { background:rgba(192,57,43,0.06); }
.timeline-day-cell.today::before { content:''; position:absolute; top:0; bottom:0; left:50%; width:2px; background:var(--red); opacity:0.5; transform:translateX(-50%); }
.tl-bar { position:absolute; height:26px; top:50%; transform:translateY(-50%); border-radius:4px; font-size:11px; font-weight:600; display:flex; align-items:center; padding:0 6px; color:#fff; white-space:nowrap; overflow:hidden; cursor:pointer; z-index:1; transition:transform .15s,box-shadow .15s; }
.tl-bar:hover { transform:translateY(-50%) scaleY(1.3); box-shadow:var(--shadow-md); z-index:3; }
.tl-pill { position:absolute; height:26px; min-width:40px; top:50%; transform:translate(-50%,-50%); border-radius:13px; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 8px; color:#fff; cursor:pointer; z-index:2; transition:transform .15s; white-space:nowrap; }
.tl-pill:hover { transform:translate(-50%,-50%) scale(1.15); z-index:3; }
.legend { display:flex; gap:16px; font-size:14px; color:var(--text-secondary); margin-top:12px; }
.legend-item { display:flex; align-items:center; gap:6px; }
.legend-dot { width:10px; height:10px; border-radius:3px; }

.list-section { display:none; }
.school-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px 24px; margin-bottom:12px; box-shadow:var(--shadow-sm); transition:box-shadow .2s; cursor:pointer; }
.school-card:hover { box-shadow:var(--shadow-md); }
.card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
.card-school-name { font-size:19px; font-weight:600; }
.card-badges { display:flex; gap:6px; flex-wrap:wrap; }
.badge { display:inline-flex; align-items:center; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:600; }
.badge-blue { background:var(--accent-light); color:var(--accent); }
.badge-green { background:var(--green-light); color:var(--green); }
.badge-amber { background:var(--amber-light); color:var(--amber); }
.card-meta { display:flex; gap:16px; font-size:14px; color:var(--text-secondary); margin-bottom:14px; flex-wrap:wrap; }
.card-schedule { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
.schedule-item { padding:10px 14px; border-radius:var(--radius-xs); border-left:3px solid; }
.schedule-item.app { background:var(--accent-light); border-color:var(--accent); }
.schedule-item.exam { background:var(--coral-light); border-color:var(--coral); }
.schedule-item.result { background:#E2F5EA; border-color:#3AAF6F; }
.schedule-label { font-size:12px; font-weight:600; color:var(--text-tertiary); margin-bottom:2px; }
.schedule-date { font-size:16px; font-weight:600; }
.schedule-detail { font-size:13px; color:var(--text-secondary); margin-top:2px; }

.compare-section { display:none; }
.compare-table-wrap { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-sm); overflow-x:auto; }
.compare-table { width:100%; border-collapse:collapse; font-size:14px; }
.compare-table th { background:var(--bg); padding:12px 16px; text-align:left; font-weight:600; font-size:13px; color:var(--text-secondary); border-bottom:1px solid var(--border); white-space:nowrap; }
.compare-table td { padding:12px 16px; border-bottom:1px solid var(--border-light); vertical-align:top; }
.compare-table tr:hover td { background:var(--bg-hover); }
.compare-table .school-name-cell { font-weight:600; white-space:nowrap; }
.exam-content-tag { display:inline-block; padding:3px 10px; background:var(--bg); border:1px solid var(--border); border-radius:4px; font-size:12px; margin:1px 2px; white-space:nowrap; }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center; padding:24px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg-card); border-radius:var(--radius); max-width:640px; width:100%; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
.modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:20px; font-weight:700; }
.modal-close { width:32px; height:32px; border:none; background:var(--bg); border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); }
.modal-body { padding:24px; }
.modal-section { margin-bottom:20px; }
.modal-section-title { font-size:14px; font-weight:600; color:var(--text-tertiary); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.05em; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.modal-field-label { font-size:12px; color:var(--text-tertiary); font-weight:500; }
.modal-field-value { font-size:15px; font-weight:500; margin-top:2px; }

.footer { text-align:center; padding:32px 24px; font-size:13px; color:var(--text-tertiary); border-top:1px solid var(--border); max-width:1200px; margin:0 auto; }

@media (max-width:768px) {
  .header-inner { height:56px; }
  .logo-text { font-size:15px; }
  .tabs { padding:12px 16px 0; overflow-x:auto; }
  .tab { padding:8px 14px; font-size:13px; white-space:nowrap; }
  .main { padding:16px 16px 40px; }
  .stats-bar { gap:8px; }
  .stat-card { padding:12px; min-width:100px; }
  .stat-value { font-size:22px; }
  .filter-bar { flex-direction:column; }
  .card-schedule { grid-template-columns:1fr; }
  .modal-grid { grid-template-columns:1fr; }
  .timeline-row { grid-template-columns:110px 1fr; }
}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">N</div>
      <div class="logo-text">受験スケジュール<span>ナビ</span></div><div style="display:flex;gap:8px;margin-left:20px"><button onclick="switchMode('suisen',this)" class="mode-btn" style="padding:6px 16px;border-radius:20px;border:2px solid var(--accent);background:var(--accent);color:white;font-weight:600;font-size:13px;cursor:pointer">推薦</button><button onclick="switchMode('ippan',this)" class="mode-btn" style="padding:6px 16px;border-radius:20px;border:2px solid var(--accent);background:white;color:var(--accent);font-weight:600;font-size:13px;cursor:pointer">一般</button></div>
    </div>
    <div class="header-controls">
      <select class="year-select" id="yearSelect">
        <option value="2027">2027年度入試</option>
        <option value="2026" selected>2026年度入試（過去）</option>
        <option value="2025">2025年度入試（過去）</option>
      </select>
    </div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('calendar',this)">カレンダー</button>
  <button class="tab" onclick="switchTab('compare',this)">比較表</button>
  <button class="tab" onclick="switchTab('list',this)">志望校診断</button>
        <button class="tab" onclick="switchTab('links',this)">入試情報リンク</button>
</div>
<div class="main">
  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="stat-label">登録校数</div><div class="stat-value blue" id="statSchools">10</div></div>
    <div class="stat-card"><div class="stat-label">入試区分数</div><div class="stat-value green" id="statEntries">18</div></div>
    <div class="stat-card"><div class="stat-label">今月の試験</div><div class="stat-value amber" id="statExams">—</div></div>
  </div>

  <div class="calendar-section" id="calendarView">
    <div class="filter-bar">
      <div style="display:flex;gap:8px;flex:1;flex-wrap:wrap"><input class="search-input" type="text" placeholder="大学名" id="calSchool" oninput="render()" style="flex:1;min-width:120px"><input class="search-input" type="text" placeholder="学部・学科" id="calDept" oninput="render()" style="flex:1;min-width:120px"><input class="search-input" type="text" placeholder="試験内容・科目" id="calContent" oninput="render()" style="flex:1;min-width:120px"></div>
      <select class="filter-select" id="calPref" onchange="render()" style="max-width:140px"><option value="">都道府県：すべて</option></select>
      <select class="filter-select" id="calType" onchange="render()">
        <option value="">入試区分：すべて</option>
        <option value="総合型選抜">総合型選抜</option>
        <option value="学校推薦型選抜">学校推薦型選抜</option>
        <option value="一般選抜">一般選抜</option>
      </select>
    </div>
    <div class="calendar-timeline">
      <div class="timeline-header">
        <div class="timeline-title">受験スケジュール タイムライン</div>
        <div class="month-nav" id="monthNav"></div>
      </div>
      <div id="timelineContent"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent);border-radius:3px;width:24px"></div>出願期間（緑バー）</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--coral);border-radius:8px;width:24px"></div>試験日（オレンジ）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3AAF6F;border-radius:8px;width:24px"></div>合格発表（緑）</div>
    </div>
  </div>

  <div class="list-section" id="listView">
    <div style="background:white;border-radius:16px;border:1px solid var(--border);padding:24px;margin-bottom:20px">
      <div style="font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:16px">あなたに合う入試を探そう</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">
        <div><label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px">文系 / 理系</label><select class="filter-select" id="dxBunkei" onchange="runDiag()" style="width:100%"><option value="">選択してください</option><option value="bun">文系</option><option value="ri">理系</option><option value="other">どちらでもない</option></select></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px">興味のある分野</label><select class="filter-select" id="dxField" onchange="runDiag()" style="width:100%"><option value="">選択してください</option><option value="法">法律・政治</option><option value="経済">経済・経営・商</option><option value="文">文学・人文・教育</option><option value="社会">社会・国際</option><option value="理">理学・数学</option><option value="工">工学・建築・情報</option><option value="農">農学・生命・環境</option><option value="医">医学・看護・薬学</option><option value="芸">芸術・スポーツ</option><option value="総">総合・学際</option></select></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px">得意科目</label><select class="filter-select" id="dxSubject" onchange="runDiag()" style="width:100%"><option value="">選択してください</option><option value="英">英語</option><option value="国">国語</option><option value="数">数学</option><option value="理科">理科</option><option value="地歴">地歴・公民</option><option value="小論">小論文が得意</option></select></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px">小論文・面接</label><select class="filter-select" id="dxEssay" onchange="runDiag()" style="width:100%"><option value="">こだわらない</option><option value="yes">小論文・面接あり希望</option><option value="no">小論文・面接なし希望</option></select></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px">入試方式</label><select class="filter-select" id="dxKyote" onchange="runDiag()" style="width:100%"><option value="">こだわらない</option><option value="dokuj">独自入試のみ</option><option value="kyote">共通テスト利用</option></select></div>
        <div><label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px">地域</label><select class="filter-select" id="dxArea" onchange="runDiag()" style="width:100%"><option value="">こだわらない</option><option value="kanto">関東</option><option value="kansai">関西</option><option value="other">その他</option></select></div>
      </div>
      <div style="margin-top:12px;text-align:right"><button onclick="resetDiag()" style="padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:white;color:var(--text-secondary);font-size:13px;cursor:pointer">リセット</button></div>
    </div>
    <div style="font-size:14px;color:var(--text-secondary);margin-bottom:12px" id="diagCount">条件を選択してください</div>
    <div id="listData"></div>
  </div>

  <div class="compare-section" id="compareView">
    <div class="filter-bar">
      <div style="display:flex;gap:8px;flex:1;flex-wrap:wrap"><input class="search-input" type="text" placeholder="大学名" id="cmpSchool" oninput="render()" style="flex:1;min-width:120px"><input class="search-input" type="text" placeholder="学部・学科" id="cmpDept" oninput="render()" style="flex:1;min-width:120px"><input class="search-input" type="text" placeholder="試験内容・科目" id="cmpContent" oninput="render()" style="flex:1;min-width:120px"></div>
      <select class="filter-select" id="cmpPref" onchange="render()" style="max-width:140px"><option value="">都道府県：すべて</option></select>
      <select class="filter-select" id="cmpType" onchange="render()">
        <option value="">入試区分：すべて</option>
        <option value="総合型選抜">総合型選抜</option>
        <option value="学校推薦型選抜">学校推薦型選抜</option>
        <option value="一般選抜">一般選抜</option>
      </select>
    </div>
    <div class="compare-table-wrap"><table class="compare-table" id="cmpTable"></table></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="mTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

const SHEETS={'2027':{suisen:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTi5SLOROmd0N_qgtSqSA8YQ5Wlfmu4XJ80_qrj5kXuzwejz4tqb_YQqIQFCrArGyyHw52wypCJBPtA/pub?gid=1235849952&single=true&output=csv',ippan:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTi5SLOROmd0N_qgtSqSA8YQ5Wlfmu4XJ80_qrj5kXuzwejz4tqb_YQqIQFCrArGyyHw52wypCJBPtA/pub?gid=638922622&single=true&output=csv'},'2026':{suisen:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTi5SLOROmd0N_qgtSqSA8YQ5Wlfmu4XJ80_qrj5kXuzwejz4tqb_YQqIQFCrArGyyHw52wypCJBPtA/pub?gid=931894113&single=true&output=csv',ippan:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTi5SLOROmd0N_qgtSqSA8YQ5Wlfmu4XJ80_qrj5kXuzwejz4tqb_YQqIQFCrArGyyHw52wypCJBPtA/pub?gid=810130631&single=true&output=csv'}};
let D=[], allD=[], curTab='calendar', curMonth=new Date(2025,9,1), curMode='suisen';

function parseCSV(text){
  const lines=[];let cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){inQ=!inQ}
    else if(c==='\n'&&!inQ){lines.push(cur);cur=''}
    else{cur+=c}
  }
  if(cur)lines.push(cur);
  return lines.map(line=>{
    const cols=[];let field='',q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){q=!q}
      else if(c===','&&!q){cols.push(field.trim());field=''}
      else{field+=c}
    }
    cols.push(field.trim());
    return cols;
  });
}

function parseDate(v){
  if(!v)return'';
  const m=v.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return'';
}

async function loadData(year){
  const cfg=SHEETS[year];
  if(!cfg)return;
  document.getElementById('timelineContent').innerHTML='<div style="text-align:center;padding:40px;color:var(--text-tertiary)">データ読み込み中...</div>';
  try{
    const res=await fetch(cfg[curMode]);
    const text=await res.text();
    const rows=parseCSV(text);
    if(rows.length<2){D=[];render();return;}
    D=rows.slice(1).filter(r=>r[0]).map(r=>({
      s:r[0]||'',k:r[1]||'',dp:r[2]||'',t:r[3]||'',r:r[4]||'—',
      mt:r[5]||'',a1:parseDate(r[6]),a2:parseDate(r[7]),am:r[8]||'',
      e1:parseDate(r[9]),e1c:r[10]||'',e2:parseDate(r[11]),e2c:r[12]||'',
      rd:parseDate(r[13]),u:r[14]||'',n:r[15]||'',km:r.length>18?r[16]:'',sk:r.length>18?r[17]:'',ht:r.length>18?r[18]:'',kt:r.length>18?r[19]:'',st:r.length>18?r[20]:'',br:r.length>18?r[21]:'',loc:r.length>18?r[22]:r[16]||''
    }));
    render();
  }catch(e){
    D=[];render();document.getElementById('timelineContent').innerHTML='<div style="text-align:center;padding:40px;color:var(--text-tertiary)">この年度のデータはまだ登録されていません。</div>';
  }
}

function fd(d){if(!d)return'—';const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}`}
function fdf(d){if(!d)return'未定';const dt=new Date(d);return`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`}

function switchTab(t,btn){
  curTab=t;
  document.querySelectorAll('.tab-content').forEach(d=>d.style.display='none');
  if(t==='links'){
    document.getElementById('links').style.display='';

    document.querySelector('.footer').style.display='none';
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderLinks();return;
  }
  document.querySelector('.main').style.display='';
  document.querySelector('.footer').style.display='';
  document.querySelectorAll('.filter-bar').forEach(b=>b.style.display='');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('calendarView').style.display=t==='calendar'?'block':'none';
  document.querySelectorAll('.mode-btn').forEach(b=>b.style.display=t==='list'?'none':'inline-block');
  document.getElementById('listView').style.display=t==='list'?'block':'none';
  document.getElementById('statsBar').style.display=t==='list'?'none':'flex';
  document.getElementById('compareView').style.display=t==='compare'?'block':'none';
}

function getFiltered(){
  const pre=curTab==='calendar'?'cal':curTab==='list'?'list':'cmp';
  const sv1=(document.getElementById(pre+'School')?.value||'').toLowerCase();
  const sv2=(document.getElementById(pre+'Dept')?.value||'').toLowerCase();
  const sv3=(document.getElementById(pre+'Content')?.value||'').toLowerCase();
  const tf=curTab==='calendar'?'calType':curTab==='list'?'listType':'cmpType';
  const tv=document.getElementById(tf)?.value||'';
  const pf=document.getElementById(pre+'Pref')?.value||'';
  const ip=curMode==='ippan';
  return D.filter(d=>{
    if(pf&&(d.loc||'')!==pf)return false;
    if(sv1&&!d.s.toLowerCase().includes(sv1))return false;
    if(sv2&&!(d.dp||'').toLowerCase().includes(sv2))return false;
    if(sv3){
      if(ip){if(!(d.km||'').toLowerCase().includes(sv3)&&!(d.mt||'').toLowerCase().includes(sv3))return false}
      else{if(!(d.e1c||'').toLowerCase().includes(sv3)&&!(d.e2c||'').toLowerCase().includes(sv3)&&!(d.mt||'').toLowerCase().includes(sv3))return false}
    }
    if(tv){if(ip){if(d.kt!==tv)return false}else{if(d.t!==tv)return false}}
    return true;
  });
}

function renderTimeline(data){
  const c=document.getElementById('timelineContent');
  const ms=new Date(curMonth.getFullYear(),curMonth.getMonth(),1);
  const me=new Date(curMonth.getFullYear(),curMonth.getMonth()+1,0);
  const dim=me.getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const colW=140;const col2=120;
  const gridCols=`${colW}px ${col2}px repeat(${dim},1fr)`;

  // Header row with day numbers
  let h=`<div class="day-header" style="display:grid;grid-template-columns:${gridCols}">`;
  h+=`<div class="day-header-cell" style="border-right:2px solid var(--border);font-weight:600;font-size:12px;color:var(--text-primary)">${ms.getMonth()+1}月</div>`;
  h+=`<div class="day-header-cell" style="border-right:2px solid var(--border);font-weight:600;font-size:12px;color:var(--text-secondary)">形態</div>`;
  for(let d=1;d<=dim;d++){
    const dt=new Date(ms.getFullYear(),ms.getMonth(),d);
    const isToday=dt.getTime()===today.getTime();
    const isSun=dt.getDay()===0;
    const isSat=dt.getDay()===6;
    const isWeekStart=dt.getDay()===1;
    const cls=['day-header-cell'];
    if(isWeekStart)cls.push('week-start');
    if(isToday)cls.push('today');
    let color='';
    if(isSun)color='color:var(--red)';
    else if(isSat)color='color:var(--accent)';
    h+=`<div class="${cls.join(' ')}" style="${color}">${d}</div>`;
  }
  h+=`</div>`;

  // Data rows
  const shown=new Set();
  data.forEach(d=>{
    const key=d.s+'|'+d.r+'|'+d.dp;
    if(shown.has(key))return;
    shown.add(key);
    const label=d.dp?d.s:d.s;
    const dept=d.dp||'';
    const sub=(d.r!=='—'?d.r:'')+(d.mt?' '+d.mt:'');

    h+=`<div class="timeline-grid-row" style="display:grid;grid-template-columns:${gridCols};cursor:pointer" onclick="openM(${D.indexOf(d)})">`;
    h+=`<div class="timeline-school-cell" title="${label} ${dept}">${label}${dept?'<small>'+dept+'</small>':''}</div>`;
    h+=`<div class="timeline-type-cell" title="${sub}">${sub}</div>`;

    // Day cells with bars
    for(let day=1;day<=dim;day++){
      const dt=new Date(ms.getFullYear(),ms.getMonth(),day);
      const isToday=dt.getTime()===today.getTime();
      const isWeekStart=dt.getDay()===1;
      const cls=['timeline-day-cell'];
      if(isWeekStart)cls.push('week-start');
      if(isToday)cls.push('today');

      let inner='';
      // App bar (spans multiple cells, only render on start day)
      if(d.a1&&d.a2){
        const s=new Date(d.a1),e=new Date(d.a2);
        const sDay=s<ms?1:s.getDate();
        const eDay=e>me?dim:e.getDate();
        if(day===sDay&&s<=me&&e>=ms){
          const span=eDay-sDay+1;
          inner+=`<div class="tl-bar" style="background:var(--accent);left:0;right:0;width:calc(${span*100}% + ${(span-1)*0}px)" onclick="openM(${D.indexOf(d)})" title="出願期間: ${fd(d.a1)}〜${fd(d.a2)}">出願 ${fd(d.a1)}〜${fd(d.a2)}</div>`;
        }
      }
      // Exam pill
      if(d.e1){
        const ed=new Date(d.e1);
        if(ed.getMonth()===ms.getMonth()&&ed.getFullYear()===ms.getFullYear()&&ed.getDate()===day){
          inner+=`<div class="tl-pill" style="background:var(--coral);left:50%" onclick="openM(${D.indexOf(d)})" title="試験日: ${fd(d.e1)}">試験</div>`;
        }
      }
      // Result pill
      if(d.rd){
        const rd=new Date(d.rd);
        if(rd.getMonth()===ms.getMonth()&&rd.getFullYear()===ms.getFullYear()&&rd.getDate()===day){
          inner+=`<div class="tl-pill" style="background:#3AAF6F;left:50%" onclick="openM(${D.indexOf(d)})" title="合格発表: ${fd(d.rd)}">発表</div>`;
        }
      }

      h+=`<div class="${cls.join(' ')}">${inner}</div>`;
    }
    h+=`</div>`;
  });

  if(!h.includes('timeline-grid-row'))h+='<div style="text-align:center;padding:30px;color:var(--text-tertiary)">この月にはデータがありません</div>';
  c.innerHTML=h;
}

function renderList(data){
  const c=document.getElementById('listData');
  const g={};data.forEach(d=>{const key=d.s;if(!g[key])g[key]=[];g[key].push(d)});
  let h='';
  Object.entries(g).forEach(([s,es])=>{
    const f=es[0];
    h+=`<div class="school-card"><div class="card-header"><div class="card-school-name">${s}</div><div class="card-badges"><span class="badge badge-blue">${f.t}</span><span class="badge badge-amber">${f.k}</span></div></div>`;
    h+=`<div class="card-meta"><span>${es.length}件</span></div><div class="card-schedule">`;
    const unique=[];const seen=new Set();
    es.forEach(e=>{const k=e.r+'|'+e.dp+'|'+e.mt;if(!seen.has(k)){seen.add(k);unique.push(e)}});
    unique.slice(0,6).forEach(e=>{
      const rLabel=(e.r!=='—'?e.r+' ':'')+(e.dp?e.dp+' ':'')+(e.mt?'('+e.mt+') ':'');
      h+=`<div class="schedule-item app" style="cursor:pointer" onclick="openM(${D.indexOf(e)})"><div class="schedule-label">${rLabel}出願</div><div class="schedule-date">${fd(e.a1)} 〜 ${fd(e.a2)}</div></div>`;
      h+=`<div class="schedule-item exam" style="cursor:pointer" onclick="openM(${D.indexOf(e)})"><div class="schedule-label">${rLabel}試験</div><div class="schedule-date">${fd(e.e1)}</div>`;
      if(e.e1c)h+=`<div class="schedule-detail">${e.e1c}</div>`;
      h+=`</div>`;
      h+=`<div class="schedule-item result" style="cursor:pointer" onclick="openM(${D.indexOf(e)})"><div class="schedule-label">${rLabel}発表</div><div class="schedule-date">${fd(e.rd)}</div></div>`;
    });
    if(unique.length>6)h+=`<div style="padding:8px;font-size:12px;color:var(--text-tertiary)">他 ${unique.length-6} 件...</div>`;
    h+=`</div></div>`;
  });
  c.innerHTML=h||'<div style="text-align:center;padding:40px;color:var(--text-tertiary)">該当するデータがありません</div>';
}

      h+=`<td>${fd(d.e1)}${d.e2?' / '+fd(d.e2):''}</td>`;

const KANTO=['早稲田','慶應','明治','中央','法政','立教','上智','東京','筑波','学習院','日本','東洋','駒澤','専修','明治学院','國學院','東京理科','東京工科','東京成徳','東京有明','東京電機','国士舘','順天堂','文教','大正','桜美林','関東学院','神奈川','ZEN','津田塾','日本女子','帝京','高崎商科','医療創生'];
const KANSAI=['立命館','同志社','近畿','桃山学院','京都橘'];
const BUN_DEPT=['法','経済','経営','商','文','社会','国際','政策','人文','教育','外国語','観光','コミュニティ','心理','異文化','福祉','総合政策'];
const RI_DEPT=['理','工','建築','情報','化学','生命','数学','物理','農','薬','医','看護','環境','生物'];

function matchArea(s,area){
  if(!area)return true;
  if(area==='kanto')return KANTO.some(k=>s.includes(k));
  if(area==='kansai')return KANSAI.some(k=>s.includes(k));
  return !KANTO.some(k=>s.includes(k))&&!KANSAI.some(k=>s.includes(k));
}
function matchBunkei(dp,bk){
  if(!bk)return true;
  const d=(dp||'').toLowerCase();
  if(bk==='bun')return BUN_DEPT.some(k=>d.includes(k));
  if(bk==='ri')return RI_DEPT.some(k=>d.includes(k));
  return true;
}
function getUniUrl(name){
  const u=uniData.find(x=>x.n===name);
  return u?u.u:null;
}
function runDiag(){
  const bk=document.getElementById('dxBunkei')?.value||'';
  const field=document.getElementById('dxField')?.value||'';
  const subj=document.getElementById('dxSubject')?.value||'';
  const essay=document.getElementById('dxEssay')?.value||'';
  const kyote=document.getElementById('dxKyote')?.value||'';
  const area=document.getElementById('dxArea')?.value||'';
  const ip=curMode==='ippan';
  const results=allD.filter(d=>{
    if(!matchArea(d.s,area))return false;
    if(!matchBunkei(d.dp,bk))return false;
    if(field&&!(d.dp||'').includes(field))return false;
    if(subj){
      const content=ip?(d.km||''):(d.e1c||'')+(d.e2c||'');
      if(!content.includes(subj))return false;
    }
    if(essay==='yes'){const ct=(d.e1c||'')+(d.e2c||'')+(d.km||'');if(!ct.includes('小論')&&!ct.includes('面接'))return false}
    if(essay==='no'){const ct=(d.e1c||'')+(d.e2c||'')+(d.km||'');if(ct.includes('小論')||ct.includes('面接'))return false}
    if(kyote==='dokuj'&&d.kt&&d.kt!=='独自入試')return false;
    if(kyote==='kyote'&&d.kt&&!d.kt.includes('共通テスト'))return false;
    return true;
  });
  document.getElementById('diagCount').textContent=results.length>0?results.length+'件の入試が見つかりました':'条件に一致する入試がありません。条件を変更してみてください。';
  renderDiagCards(results);
}
function resetDiag(){
  ['dxBunkei','dxField','dxSubject','dxEssay','dxKyote','dxArea'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  runDiag();
}
function renderDiagCards(data){
  const c=document.getElementById('listData');
  if(!data.length){c.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-tertiary)">条件を選択してください</div>';return}
  const g={};data.forEach(d=>{const k=d.s;if(!g[k])g[k]=[];g[k].push(d)});
  let h='';
  Object.entries(g).forEach(([s,es])=>{
    h+='<div class="school-card"><div class="card-header"><div class="card-school-name">'+s+'</div>';var uu=getUniUrl(s);if(uu)h+='<a href="'+uu+'" target="_blank" rel="noopener" style="margin-left:8px;padding:4px 10px;font-size:12px;background:var(--accent);color:#fff;border-radius:6px;text-decoration:none;white-space:nowrap">入試情報</a>';h+='<div class="card-badges"><span class="badge badge-blue">'+es.length+'件</span></div></div>';
    h+='<div class="card-schedule">';
    const seen=new Set();
    es.forEach(e=>{
      const k=(e.dp||'')+'|'+(e.mt||'');
      if(seen.has(k))return;seen.add(k);
      h+='<div class="schedule-item app" style="cursor:pointer" onclick="openDiagM('+allD.indexOf(e)+')"><div class="schedule-label" style="font-weight:600">'+(e.dp||'')+'</div><div class="schedule-date" style="font-size:12px;color:var(--text-secondary)">'+(e.mt||e.t)+'</div>';
      if(e.km)h+='<div style="margin-top:4px">'+e.km.split('・').map(function(s){return '<span class="exam-content-tag" style="margin:1px">'+s+'</span>'}).join('')+'</div>';
      else if(e.e1c)h+='<div style="margin-top:4px">'+e.e1c.split('、').map(function(s){return '<span class="exam-content-tag" style="margin:1px">'+s+'</span>'}).join('')+'</div>';
      h+='<div style="font-size:11px;color:var(--text-tertiary);margin-top:4px">出願: '+fd(e.a1)+' 〜 '+fd(e.a2)+'　試験: '+fd(e.e1)+'　発表: '+fd(e.rd)+'</div></div>';
    });
    h+='</div></div>';
  });
  c.innerHTML=h;
}

    h+='<div style="display:flex;align-items:center;justify-content:space-between">';

    h+='<span style="font-size:15px;font-weight:600">'+u.n+'</span></div>';
    h+='<span style="font-size:12px;color:var(--accent)">入試情報 →</span>';
    h+='</div></a>';
  });
  h+='</div>';
  document.getElementById('linkList').innerHTML=h;
}
